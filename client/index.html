<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Nattawee Hasitpanichkul | Senior Legal Executive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="locked">
    <div id="login-overlay" class="login-overlay">
        <div id="login-card" class="login-card">
            <div class="login-icon">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2>Private Access</h2>
            <p>Please enter the password to view this profile.</p>
            <div class="login-input-container">
                <input type="password" id="password-input" placeholder="Password" onkeypress="handleLoginKeyPress(event)" autocomplete="current-password">
                <button onclick="checkPassword()">Unlock</button>
            </div>
            <p id="login-error" class="login-error"></p>
        </div>

        <div id="welcome-message" class="welcome-message" style="display: none;">
            <p class="welcome-line-1">By entering, you're not just viewing a resume.</p>
            <p class="welcome-line-2">Welcome to the demonstration of the future of legal productivity.</p>
            <p class="welcome-line-3">This site was designed and vibe-coded by me using Gemini CLI.</p>
        </div>
    </div>

    <div id="main-content" style="display: none; opacity: 0;">
        <header>
        <h1>Nattawee Hasitpanichkul</h1>
        <nav>
            <a href="https://www.linkedin.com/in/nattawee-h-48908b92/" target="_blank">LinkedIn</a>
            <a href="mailto:hnattawee@gmail.com">Contact</a>
        </nav>
    </header>
    <main>
        <div id="experience-toggles" class="toggle-container">
            <button class="toggle-btn active" data-mode="experience">Experience</button>
            <button class="toggle-btn" data-mode="education">Education / Licenses</button>
            <button class="toggle-btn" data-mode="skills">Skills</button>
            <button class="toggle-btn" data-mode="contact">Contact</button>
        </div>
        
        <div id="experience-container">
            <!-- Content injected by script.js -->
        </div>
    </main>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
